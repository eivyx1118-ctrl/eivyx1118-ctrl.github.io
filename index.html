<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eivyx</title>

<link rel="stylesheet" href="animation.css">
<link rel="stylesheet" href="glitch.css">

<style>
/* --- ページ全体のスタイル --- */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  min-height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
}

/* --- 中央表示用タイトル --- */
h1#main-title {
  font-size: 5vw !important;   /* 画面幅に応じて文字サイズ */
  line-height: 1.2 !important;
  text-align: center;
  color: #333 !important;
  margin: 20px 0 !important;
  overflow: visible !important;
  white-space: nowrap !important;
}

/* --- HEROセクション --- */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.hero img.logo {
  max-width: 200px;
  margin-bottom: 20px;
}

h1.glitch {
  font-size: 5vw;       /* HERO 内アニメーション文字サイズ */
  line-height: 1.2;
  color: white;
  margin: 0;
  text-align: center;
  white-space: nowrap;
}

.hero-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* --- 背景動画 --- */
.bg-video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.2;
}

/* --- 外部CSSとの競合防止 --- */
h1 { font-size: inherit; letter-spacing: normal; margin: 0; }

</style>
</head>

<body>

<!-- ページ中央表示 -->
<h1 id="main-title">eivyx</h1>

<!-- HERO セクション -->
<section class="hero">
  <video autoplay muted loop playsinline class="bg-video">
    <source src="noise.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <img src="eivyx-logo.png" class="logo">
    <h1 class="glitch" data-text="eivyx">eivyx</h1>
    <p class="tag">art rock from japan</p>
  </div>
</section>

<!-- MUSIC -->
<section class="section">
  <h2>MUSIC</h2>
  <iframe
    src="https://open.spotify.com/embed/track/"
    width="320"
    height="80"
    frameborder="0">
  </iframe>
</section>

<!-- VIDEO -->
<section class="section video">
  <h2>VIDEO</h2>
  <iframe
    src="https://www.youtube.com/embed/ybKl1lU73Fc"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
</section>

<!-- DISCOGRAPHY -->
<section class="section">
  <h2>DISCOGRAPHY</h2>
  <div class="discography">
    <div class="release">
      <img src="cover1.jpg">
      <p>EP 01</p>
    </div>
    <div class="release">
      <img src="cover2.jpg">
      <p>EP 02</p>
    </div>
  </div>
</section>

<!-- CONNECT -->
<section class="section">
  <h2>CONNECT</h2>
  <div class="links">
    <a href="#">Instagram</a>
    <a href="#">YouTube</a>
    <a href="#">Spotify</a>
  </div>
</section>

<footer>
  © eivyx
</footer>

<!-- BGM -->
<audio id="bgm" loop>
  <source src="ambient.mp3" type="audio/mpeg">
</audio>

<div class="bgm-player">
  <span>BGM</span>
  <button onclick="playBGM()">Play</button>
  <button onclick="stopBGM()">Stop</button>
</div>

<script>
/* スクロールフェード */
const sections = document.querySelectorAll(".section");
window.addEventListener("scroll", () => {
  const trigger = window.innerHeight * 0.8;
  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if (top < trigger) section.classList.add("show");
  });
});

/* BGM */
const bgm = document.getElementById("bgm");
function playBGM() {
  bgm.volume = 0;
  bgm.play();
  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.5) {
      vol += 0.02;
      bgm.volume = vol;
    } else clearInterval(fade);
  }, 100);
}
function stopBGM() { bgm.pause(); }
</script>

<script src="parallax.js"></script>
<script src="cursor-ink.js"></script>

</body>
</html>
