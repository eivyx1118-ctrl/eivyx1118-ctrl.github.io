<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EIVYX</title>

<link rel="stylesheet" href="animation.css">
<link rel="stylesheet" href="glitch.css">

<style>

body{
margin:0;
font-family:Helvetica,Arial,sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
position:relative;
height:100vh;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.6);
transition:transform 0.2s;
}

/* 動画背景 */

.bg-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.2;
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:64px;
letter-spacing:10px;
margin:20px 0;
}

.tag{
opacity:0.7;
}

/* SECTION */

.section{
padding:120px 20px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* NEWS */

iframe{
margin-top:30px;
border-radius:12px;
}

/* VIDEO */

.video iframe{
width:80%;
max-width:800px;
height:450px;
}

/* DISCOGRAPHY */

.discography{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:60px;
}

.release{
width:220px;
}

.release img{
width:100%;
border-radius:8px;
}

/* LINKS */

.links{
margin-top:40px;
}

.links a{

margin:0 20px;
font-size:30px;
color:white;
opacity:0.6;
transition:0.3s;

}

.links a:hover{

opacity:1;
transform:scale(1.3);

}

/* YouTubeだけ赤にする */

.links a:nth-child(2):hover{

color:#ff0000;

}

.links a:hover{
opacity:1;
}

footer{
padding:40px;
text-align:center;
opacity:0.4;
}

/* BGM PLAYER */

.bgm-player{

position:fixed;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
padding:12px 18px;
border-radius:30px;
display:flex;
align-items:center;
gap:10px;
font-size:14px;

}

.bgm-player button{

background:white;
border:none;
border-radius:20px;
padding:6px 14px;
cursor:pointer;

}

</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="paint-bg"></div>

<!-- HERO -->

<section class="hero">

<video autoplay muted loop playsinline class="bg-video">
<source src="noise.mp4" type="video/mp4">
</video>

<img src="artist-photo.png">

<div class="hero-content">

<img src="eivyx-logo.png" class="logo">

<!h1 class="glitch" data-text="eivyx">eivyx</h1>

<p class="tag">art rock from japan</p>

</div>

</section>

<!-- NEWS -->

<section class="section">

<h2>NEWS</h2>

<p>2026.05.02 – New track "Abyss Drive" release</p>

<p>2026.03.10 – EIVYX Official website launched</p>


</section>

<!-- VIDEO -->

<section class="section video">

<h2>VIDEO</h2>

<iframe
src="https://www.youtube.com/embed/YbwCTwt-CZE?si=ceU3u_SC1l1wtoRf"
title="YouTube video player"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>

</section>

<!-- DISCOGRAPHY -->

<section class="section">

<h2>DISCOGRAPHY</h2>

<div class="discography">

<div class="release">
<img src="AbyssDrive.png">
<p>Abyss Drive</p>
</div>

<div class="release">
<img src="cover2.jpg">
<p>EP 02</p>
</div>

</div>

</section>

<!-- CONNECT -->

<section class="section">

<h2>CONNECT</h2>

<div class="links">

<a href="#"><i class="fab fa-instagram"></i></a>
<a href="https://www.youtube.com/@eivyx3"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-spotify"></i></a>

</div>

</section>
</div>

</section>

<footer>

© eivyx

</footer>


<!-- BGM -->

<audio id="bgm" loop>
<source src="ambient.mp3" type="audio/mpeg">
</audio>

<div class="bgm-player">

<span>BGM</span>

<button onclick="playBGM()">Play</button>
<button onclick="stopBGM()">Stop</button>

</div>


<script>

/* スクロールフェード */

const sections=document.querySelectorAll(".section");

window.addEventListener("scroll",()=>{

const trigger=window.innerHeight*0.8;

sections.forEach(section=>{

const top=section.getBoundingClientRect().top;

if(top<trigger){

section.classList.add("show");

}

});

});


/* BGM */

const bgm=document.getElementById("bgm");

function playBGM(){

bgm.volume=0;

bgm.play();

let vol=0;

const fade=setInterval(()=>{

if(vol<0.5){

vol+=0.02;

bgm.volume=vol;

}else{

clearInterval(fade);

}

},100);

}

function stopBGM(){

bgm.pause();

}

</script>

<script src="parallax.js"></script>
<script src="cursor-ink.js"></script>

</body>

</html>
